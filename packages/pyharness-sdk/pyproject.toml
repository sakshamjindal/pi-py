[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness"
version = "0.1.0"
description = "Agent loop kernel: LLM client, tool ABC, sessions, queues, events, extension runtime."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pi-py contributors" }]
dependencies = [
    "litellm>=1.50.0",
    "pydantic>=2.6",
    "aiofiles>=23.2",
]

[tool.setuptools.packages.find]
where = ["src"]
