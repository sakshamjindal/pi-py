[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness"
version = "0.1.0"
description = "Agent loop kernel for Python LLM agents — straight-line loop, tool ABC, sessions, event bus, extension runtime, LiteLLM-backed. The core of pi-py."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pi-py contributors" }]
keywords = [
    "agent",
    "ai-agent",
    "llm-agent",
    "agent-loop",
    "agent-framework",
    "agent-sdk",
    "agentic",
    "claude",
    "anthropic",
    "litellm",
    "tool-use",
    "function-calling",
    "headless-agent",
    "pi-mono",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "litellm>=1.50.0",
    "pydantic>=2.6",
    "aiofiles>=23.2",
]

[tool.setuptools.packages.find]
where = ["src"]
