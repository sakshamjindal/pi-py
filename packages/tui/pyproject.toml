[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness-tui"
version = "0.1.0"
description = "Minimal interactive REPL for dogfooding the pyharness coding agent. Stdlib-only; passive subscriber to the event bus."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pyharness contributors" }]
dependencies = [
    "pyharness",
    "harness",
]

[project.scripts]
pyharness-tui = "pyharness_tui.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
