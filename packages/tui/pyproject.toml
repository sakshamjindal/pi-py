[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness-tui"
version = "0.1.0"
description = "Reserved package slot for an out-of-tree TUI; intentionally empty in v1."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pyharness contributors" }]
dependencies = ["pyharness"]

[tool.setuptools.packages.find]
where = ["src"]
