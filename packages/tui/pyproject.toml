[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness-tui"
version = "0.1.0"
description = "Minimal rich-formatted TUI for the pyharness coding agent. Passive renderer; never threads back into the SDK or harness loop."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pyharness contributors" }]
dependencies = [
    "pyharness",
    "harness",
    "rich>=13.0",
]

[project.scripts]
pyharness-tui = "pyharness_tui.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
