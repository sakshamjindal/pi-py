[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyharness"
version = "0.1.0"
description = "A minimal Python agent harness for running LLM-driven coding and finance agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "pyharness contributors" }]
dependencies = [
    "litellm>=1.50.0",
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "aiofiles>=23.2",
    "httpx>=0.27",
    "python-frontmatter>=1.1",
]

[project.optional-dependencies]
extract = ["trafilatura>=1.8"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
]

[project.scripts]
pyharness = "pyharness.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
