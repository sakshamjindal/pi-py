name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.12
      - name: Ruff version
        run: |
          which ruff
          ruff --version
          python -m ruff --version
      - name: Ruff check
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install workspace (editable)
        run: |
          pip install -e packages/pyharness-sdk \
                      -e packages/coding-harness \
                      -e packages/tui \
                      -e ".[dev]"
      - name: Run tests
        run: pytest -q
